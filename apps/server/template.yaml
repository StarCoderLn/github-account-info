AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    VpcConfig:
      SubnetIds:
        - subnet-0271ef8002e00346a
      SecurityGroupIds:
        - sg-0f1137c6844a4c9fb

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
  CorsOrigin:
    Type: String

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: github-account-info-api
      Handler: lambda.handler
      CodeUri: dist/
      Description: GitHub Account Info API
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          CORS_ORIGIN: !Ref CorsOrigin
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        RootEvent:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
